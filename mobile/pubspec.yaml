name: billy
description: AI-powered crypto bill payment assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Web3
  web3dart: ^2.7.1
  http: ^1.1.0
  walletconnect_flutter_v2: ^2.1.15
  url_launcher: ^6.2.2
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  
  # Utilities
  dio: ^5.4.0
  get_it: ^7.6.4
  
  # SMS - using permission_handler for now
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
